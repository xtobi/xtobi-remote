<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XTobi Control Center</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header class="topbar">

    <div class="logo">
        📱 XTobi Control Center
    </div>

    <nav>

        <a href="#">Dashboard</a>

        <a href="#">Remote</a>

        <a href="#">Apps</a>

        <a href="settings.html">Settings</a>

    </nav>

</header>

<main class="container">

    <section class="phone-card">

        <div>

            <h2>Infinix Smart 8</h2>

            <span class="online">🟢 Connected</span>

        </div>

    </section>

    <section class="status-grid">

        <div class="status-card">

            <div class="icon">🔋</div>

            <h3>Battery</h3>

            <p id="battery">--%</p>

        </div>

        <div class="status-card">

            <div class="icon">📶</div>

            <h3>WiFi</h3>

            <p id="wifi">Unknown</p>

        </div>

        <div class="status-card">

            <div class="icon">📡</div>

            <h3>Mobile</h3>

            <p id="mobile">Unknown</p>

        </div>

        <div class="status-card">

            <div class="icon">📍</div>

            <h3>GPS</h3>

            <p id="gps">Unknown</p>

        </div>

    </section>

    <h2 class="title">

        Remote Controls

    </h2>

    <div id="buttons" class="buttons-grid"></div>

</main>

<script src="js/app.js"></script>

</body>

</html>
