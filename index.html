<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XTobi Remote - Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
</head>

<body>

  <header class="topbar">
    <div class="logo">
      <span class="material-symbols-rounded" style="font-size: 28px; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">settings_remote</span>
      <span>XTobi Remote</span>
    </div>

    <div class="searchBox">
      <input
        id="search"
        type="text"
        placeholder="Search command..."
        autocomplete="off">
    </div>

    <div class="status" id="status">
      🟢 Ready
    </div>

    <a href="settings.html" class="settings" title="Settings">
      <span class="material-symbols-rounded">settings</span>
    </a>
  </header>

  <main class="container">
    <section class="deviceCard">
      <div class="deviceLeft">
        <h2 id="deviceName">
          <span class="material-symbols-rounded" style="font-size: 32px; color: var(--accent-blue);">smartphone</span>
          Infinix Smart 8
        </h2>
        <p class="online" id="connectionStatus">Checking...</p>
      </div>

      <div class="deviceRight">
        <div class="infoBox" id="batteryCard">
          <span class="material-symbols-rounded">battery_full</span>
          <div>
            <h4>Battery</h4>
            <p id="battery">--%</p>
          </div>
        </div>

        <div class="infoBox" id="locationCard">
          <span class="material-symbols-rounded">location_on</span>
          <div>
            <h4>Location</h4>
            <p id="location">Tap to update</p>
          </div>
        </div>

        <div class="infoBox">
          <span class="material-symbols-rounded">screen_search_desktop</span>
          <div>
            <h4>Screen</h4>
            <p id="screen">⚫ Screen Unknown</p>
          </div>
        </div>
      </div>
    </section>

    <div id="buttons"></div>

    <div id="history" class="deviceCard">
      <div class="deviceLeft">
        <h2>
          <span class="material-symbols-rounded" style="font-size: 32px; color: var(--accent-purple);">history</span>
          Command History
        </h2>
        <p class="online" style="background: rgba(255, 255, 255, 0.04); color: var(--text-secondary); border-color: rgba(255, 255, 255, 0.08);">
          Last Commands
        </p>
      </div>

      <div class="deviceRight">
        <div class="infoBox" style="grid-column: span 3;">
          <span class="material-symbols-rounded">history</span>
          <div>
            <h4>Last Triggered Action</h4>
            <div id="lastCommand">No commands yet</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="toast"></div>

  <script src="js/app.js"></script>
  <script type="module" src="js/firebase.js"></script>

</body>
</html>
