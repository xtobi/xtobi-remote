<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Settings</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="topbar">

<div class="logo">

⚙ Settings

</div>

<a href="index.html" class="settings">

🏠

</a>

</header>

<main class="container">

<div class="deviceCard">

<h2>Webhook URL</h2>

<br>

<input
id="webhook"
type="text"
placeholder="https://trigger.macrodroid.com/..."
style="width:100%;padding:15px;border-radius:12px;border:none;background:#2a2a2a;color:white;font-size:16px;">

<br><br>

<button
class="control-btn"
style="background:#4CAF50;width:100%;"
onclick="saveWebhook()">

Save

</button>

<br><br>

<button
class="control-btn"
style="background:#f44336;width:100%;"
onclick="clearWebhook()">

Clear

</button>

</div>

</main>

<script src="js/settings.js"></script>

</body>

</html>
