<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - XTobi Remote</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
</head>

<body>

  <header class="topbar">
    <div class="logo">
      <span class="material-symbols-rounded" style="font-size: 28px; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">settings</span>
      <span>Settings</span>
    </div>
    <a href="index.html" class="settings-home" title="Go back to Dashboard">
      <span class="material-symbols-rounded">home</span>
    </a>
  </header>

  <main class="container">
    <div class="settings-card">
      <div class="settings-header">
        <span class="material-symbols-rounded settings-icon">link</span>
        <div>
          <h2>Webhook URL</h2>
          <p class="settings-subtitle">Configure the secure webhook endpoint for dispatching remote command signals via MacroDroid or other workflow managers.</p>
        </div>
      </div>

      <div class="settings-body">
        <div class="input-wrapper">
          <input
            id="webhook"
            type="text"
            placeholder="https://trigger.macrodroid.com/..."
            autocomplete="off">
        </div>

        <div class="settings-actions">
          <button class="save-btn" onclick="saveWebhook()">
            <span class="material-symbols-rounded">save</span>
            Save Settings
          </button>
          <button class="clear-btn" onclick="clearWebhook()">
            <span class="material-symbols-rounded">delete_sweep</span>
            Clear Webhook
          </button>
        </div>
      </div>
    </div>
  </main>

  <script src="js/settings.js"></script>

</body>

</html>
